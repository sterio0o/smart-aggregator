<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Мои отчеты</title>
    <style>
        .active-page { font-weight: bold; font-size: 1.2em; color: black; }
        .page-link { margin: 0 5px; text-decoration: none; color: blue; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn { padding: 8px 16px; background: #007bff; color: white; text-decoration: none; border-radius: 4px; }
        .btn:hover { background: #0056b3; }
        .btn-secondary { background: #6c757d; }
        .btn-secondary:hover { background: #5a6268; }
        .btn-profile { background: #17a2b8; }
        .btn-profile:hover { background: #138496; }
        .table { width: 100%; border-collapse: collapse; }
        .table th, .table td { padding: 10px; text-align: left; border: 1px solid #ddd; }
        .table th { background: #f2f2f2; }
        .pagination { margin-top: 20px; }
        .empty { text-align: center; padding: 40px; color: #666; }
        .report-date { white-space: nowrap; }
        .report-summary { max-width: 400px; word-break: break-word; }
        .keywords { display: inline-block; background: #e9ecef; padding: 2px 8px; margin: 2px; border-radius: 12px; font-size: 0.85em; }
        .content-ids { font-size: 0.85em; color: #666; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2>Мои отчеты</h2>
        <div>
            <a th:href="@{/web/profiles/my-profile}" class="btn btn-profile">Мой профиль</a>
            <a th:href="@{/web/profiles/my-sources}" class="btn btn-secondary">Мои источники</a>
            <a th:href="@{/web/profiles/sources}" class="btn">Все источники</a>
        </div>
    </div>

    <table class="table">
        <thead>
        <tr>
            <th>ID отчета</th>
            <th>Сводка от нейросети</th>
            <th>Ключевые слова</th>
            <th>Количество документов</th>
            <th>Дата создания</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="report : ${reportsPage.content}">
            <td th:text="${report.id}" style="font-family: monospace; font-size: 0.9em;">uuid</td>
            <td class="report-summary">
                <div th:text="${report.aiSummary}">Сводка отчета</div>
            </td>
            <td>
                <span th:each="keyword : ${report.keywords}" class="keywords" th:text="${keyword}"></span>
                <span th:if="${report.keywords == null or report.keywords.empty}" style="color: #999;">Нет ключевых слов</span>
            </td>
            <td>
                <span th:text="${report.sourceContentIds != null ? report.sourceContentIds.size() : 0}">0</span>
                <span class="content-ids" th:if="${report.sourceContentIds != null and !report.sourceContentIds.empty}">
                    <br/>
                    <span th:each="id : ${report.sourceContentIds}" style="display: inline-block; font-size: 0.75em; background: #f8f9fa; padding: 1px 6px; margin: 1px; border-radius: 4px; font-family: monospace;" th:text="${id}"></span>
                </span>
            </td>
            <td class="report-date" th:text="${#temporals.format(report.createdAt, 'dd.MM.yyyy HH:mm')}">01.01.2024 12:00</td>
        </tr>
        <tr th:if="${reportsPage.empty}">
            <td colspan="5" class="empty">У вас нет созданных отчетов</td>
        </tr>
        </tbody>
    </table>

    <!-- Пагинация -->
    <div th:if="${reportsPage.totalPages > 1}" class="pagination">
        <span>Страницы: </span>
        <span th:each="i : ${#numbers.sequence(0, reportsPage.totalPages - 1)}">
            <a th:href="@{/web/profiles/my-reports(page=${i}, size=${reportsPage.size})}"
               th:text="${i + 1}"
               th:class="${reportsPage.number == i} ? 'page-link active-page' : 'page-link'">
            </a>
        </span>
    </div>
</div>
</body>
</html>
